spring.application.name=tienda-jmr-lmg-api
# Puerto distinto al de la web local(8080)
server.port=8000

# H2 en memoria
spring.datasource.url=jdbc:h2:mem:tiendaapi;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

#Consola H2 accesible en http://localhost:8000/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.defer-datasource-initialization=true

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.sql.init.mode=always

# JWT
# Clave Base64 de al menos 256 bits
jwt.secret=dGhpcyBpcyBhIHZlcnkgc2VjdXJlIHNlY3JldCBrZXkgZm9yIEpXVCB0b2tlbnM=
# Access token: 1 hora
jwt.access-token-expiration=3600000
# Refresh token: 7 días
jwt.refresh-token-expiration=604800000