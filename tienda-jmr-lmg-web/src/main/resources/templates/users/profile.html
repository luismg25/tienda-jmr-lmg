<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${title})}">
    <title>Perfil</title>
</head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container mt-5">
    <h1 class="border-start border-info border-4 ps-3 mb-4">Perfil de Usuario</h1>
    <div class="card shadow">
        <div class="card-body">
            <p><strong>Nombre:</strong> <span th:text="${usuario.nombre} + ' ' + ${usuario.apellidos}"></span></p>
            <p><strong>Email:</strong> <span th:text="${usuario.email}"></span></p>
            <p><strong>Teléfono:</strong> <span th:text="${usuario.telefono ?: 'No disponible'}"></span></p>
            <p><strong>Fecha Registro:</strong> <span th:text="${#temporals.format(usuario.fechaRegistro, 'dd/MM/yyyy HH:mm')}"></span></p>

            <hr>
            <p><strong>Roles asignados:</strong></p>
            <ul>
                <li th:each="rol : ${usuario.roles}" th:text="${rol.descripcion}"></li>
            </ul>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>

</body>
</html>
