<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Iniciar sesión')}"><title>Iniciar sesión</title></head>
<body class="bg-light">
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container mt-5 mb-5" style="max-width: 500px;">
    <h2 class="mb-4 text-center"><i class="bi bi-box-arrow-in-right me-2"></i>Bienvenido</h2>

    <div th:if="${param.error}" class="alert alert-danger" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>Usuario o contraseña incorrectos.
    </div>
    <div th:if="${param.registrado}" class="alert alert-success" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i>¡Registro completado! Ya puedes iniciar sesión.
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-4">
            <form th:action="@{/login}" method="post">
                <div class="mb-3">
                    <label for="username" class="form-label fw-semibold">Correo electrónico</label>
                    <input type="email" class="form-control" id="username" name="username" required autofocus>
                </div>

                <div class="mb-4">
                    <label for="password" class="form-label fw-semibold">Contraseña</label>
                    <input type="password" class="form-control" id="password" name="password" required>
                </div>

                <button type="submit" class="btn btn-info w-100 btn-lg text-white fw-bold">
                    Iniciar sesión
                </button>
            </form>
        </div>
    </div>

    <p class="text-center mt-4 text-muted">
        ¿No tienes cuenta? <a th:href="@{/register}" class="text-info text-decoration-none fw-bold">Regístrate aquí</a>
    </p>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
