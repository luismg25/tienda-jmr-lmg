<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Registro')}"><title>Registro</title></head>
<body class="bg-light">
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container mt-5 mb-5" style="max-width: 600px;">
    <h2 class="mb-4"><i class="bi bi-person-plus me-2"></i>Crear cuenta</h2>

    <div th:if="${error}" class="alert alert-danger">
        <span th:text="${error}"></span>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-4">
            <form th:action="@{/register}" method="post" th:object="${registroDTO}">

                <div class="row g-3">
                    <div class="col-md-6">
                        <label for="nombre" class="form-label fw-semibold">Nombre *</label>
                        <input type="text" class="form-control" id="nombre"
                               th:field="*{nombre}" required>
                    </div>
                    <div class="col-md-6">
                        <label for="apellidos" class="form-label fw-semibold">Apellidos *</label>
                        <input type="text" class="form-control" id="apellidos"
                               th:field="*{apellidos}" required>
                    </div>
                </div>

                <div class="mb-3 mt-3">
                    <label for="email" class="form-label fw-semibold">Correo electrónico *</label>
                    <input type="email" class="form-control" id="email"
                           th:field="*{email}" required>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label fw-semibold">Contraseña *</label>
                    <input type="password" class="form-control" id="password"
                           th:field="*{password}" required minlength="6">
                </div>

                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <label for="telefono" class="form-label fw-semibold">Teléfono</label>
                        <input type="tel" class="form-control" id="telefono"
                               th:field="*{telefono}">
                    </div>
                    <div class="col-md-6">
                        <label for="fechaNacimiento" class="form-label fw-semibold">Fecha de nacimiento</label>
                        <input type="date" class="form-control" id="fechaNacimiento"
                               th:field="*{fechaNacimiento}">
                    </div>
                </div>

                <div class="mb-4 form-check">
                    <input type="checkbox" class="form-check-input" id="aceptaCondiciones"
                           th:field="*{aceptaCondiciones}">
                    <label class="form-check-label" for="aceptaCondiciones">
                        Acepto las <a th:href="@{/terms}" target="_blank">condiciones de uso</a>
                        de Geocontrol *
                    </label>
                </div>

                <button type="submit" class="btn btn-info w-100 btn-lg">
                    Crear cuenta
                </button>
            </form>
        </div>
    </div>

    <p class="text-center mt-3 text-muted">
        ¿Ya tienes cuenta? <a th:href="@{/login}">Inicia sesión</a>
    </p>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
