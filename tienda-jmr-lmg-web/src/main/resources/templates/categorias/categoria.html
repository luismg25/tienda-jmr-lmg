<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${categoria.nombre})}"><title>Categoría?</title></head>
<body class="bg-light">
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container mt-5">
    <div class="row bg-white p-4 rounded shadow-sm mb-5 align-items-center">
        <div class="col-md-3">
            <img th:src="@{${categoria.imagen != null && !categoria.imagen.isEmpty() ? '/imagenes/categorias/' + categoria.imagen : '/imagenes/no-image.png'}}"
                 class="img-fluid rounded border" th:alt="${categoria.nombre}">
        </div>
        <div class="col-md-9">
            <h1 class="display-4 text-dark" th:text="${categoria.nombre}">Nombre de Categoría</h1>
            <p class="lead text-muted" th:text="${categoria.descripcion}">Descripción de la categoría.</p>
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a th:href="@{/categorias}">Categorías</a></li>
                    <li class="breadcrumb-item active" aria-current="page" th:text="${categoria.nombre}">Actual</li>
                </ol>
            </nav>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-header bg-dark text-white">
            <h3 class="card-title mb-0">Catálogo de Productos</h3>
        </div>
        <div class="card-body p-0">
            <table class="table table-hover mb-0 align-middle">
                <thead class="table-light">
                <tr>
                    <th class="ps-4">Nombre</th>
                    <th>Origen</th>
                    <th>Precio</th>
                    <th>Estado</th>
                    <th class="text-center">Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="p : ${productos}">
                    <td class="ps-4 fw-bold" th:text="${p.nombre}">Nombre del Producto</td>
                    <td th:text="${p.origen ?: 'N/A'}">Origen</td>
                    <td th:text="${#numbers.formatDecimal(p.precio, 1, 2) + ' €'}">0.00 €</td>
                    <td>
                        <span th:if="${p.agotado}" class="badge bg-danger">Agotado</span>
                        <span th:unless="${p.agotado}" class="badge bg-success">En Stock</span>
                    </td>
                    <td class="text-center">
                        <a th:href="@{/productos/{id}(id=${p.id})}" class="btn btn-sm btn-outline-info">
                            Ver Detalles
                        </a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(productos)}">
                    <td colspan="5" class="text-center py-4 text-muted">No hay productos disponibles en esta categoría actualmente.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="mt-4">
        <a th:href="@{/categorias}" class="btn btn-secondary">← Volver al listado general</a>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
