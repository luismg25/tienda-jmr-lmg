<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/layout :: head(${categoria.id == null ? 'Nueva categoría' : 'Editar categoría'})}"><title>Categoría</title></head>
<body class="bg-light">
<nav th:replace="~{admin/layout :: navbar}"></nav>

<div class="container mt-4 mb-5" style="max-width: 650px;">
    <h2 class="mb-4">
        <i class="bi bi-grid me-2"></i>
        <span th:text="${categoria.id == null ? 'Nueva categoría' : 'Editar categoría'}">Categoría</span>
    </h2>

    <div th:if="${error}" class="alert alert-danger" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        <span th:text="${error}"></span>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-4">
            <form th:action="${categoria.id == null ? '/admin/categorias/new' : '/admin/categorias/' + categoria.id + '/edit'}"
                  method="post">

                <div class="mb-3">
                    <label for="nombre" class="form-label fw-semibold">
                        Nombre <span class="text-danger">*</span>
                    </label>
                    <input type="text" class="form-control" id="nombre" name="nombre"
                           th:value="${categoria.nombre}" required maxlength="100"
                           placeholder="Nombre de la categoría">
                </div>

                <div class="mb-3">
                    <label for="descripcion" class="form-label fw-semibold">Descripción</label>
                    <textarea class="form-control" id="descripcion" name="descripcion"
                              rows="3" maxlength="2000"
                              placeholder="Descripción de la categoría"
                              th:text="${categoria.descripcion}"></textarea>
                </div>

                <div class="mb-3">
                    <label for="imagen" class="form-label fw-semibold">Imagen</label>
                    <input type="text" class="form-control" id="imagen" name="imagen"
                           th:value="${categoria.imagen}"
                           placeholder="Nombre del archivo (ej: minerales.jpg)">
                    <div class="form-text">Nombre del archivo en /imagenes/categorias/</div>
                </div>

                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-check-lg me-1" aria-hidden="true"></i>Guardar
                    </button>
                    <a th:href="@{/admin/categorias}" class="btn btn-outline-secondary">
                        <i class="bi bi-x-lg me-1" aria-hidden="true"></i>Cancelar
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>

<footer th:replace="~{admin/layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
