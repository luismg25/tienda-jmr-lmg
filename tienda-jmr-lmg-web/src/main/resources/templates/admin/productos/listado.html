<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/layout :: head('Productos')}"><title>Productos</title></head>
<body class="bg-light">
<nav th:replace="~{admin/layout :: navbar}"></nav>

<div class="container mt-4 mb-5">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="mb-0"><i class="bi bi-box-seam me-2"></i>Productos</h2>
        <a th:href="@{/admin/productos/new}" class="btn btn-primary">
            <i class="bi bi-plus-lg me-1" aria-hidden="true"></i>Nuevo producto
        </a>
    </div>

    <div th:if="${error}" class="alert alert-danger" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        <span th:text="${error}"></span>
    </div>

    <div class="card shadow-sm border-0">
        <div class="table-responsive">
            <table class="table table-hover table-striped align-middle mb-0">
                <thead class="table-secondary">
                <tr>
                    <th scope="col">#</th>
                    <th scope="col">Nombre</th>
                    <th scope="col">Marca</th>
                    <th scope="col">Precio</th>
                    <th scope="col">Descuento</th>
                    <th scope="col">Estado</th>
                    <th scope="col" class="text-end">Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(productos)}">
                    <td colspan="7" class="text-center text-muted py-4">No hay productos registrados.</td>
                </tr>
                <tr th:each="p : ${productos}">
                    <td th:text="${p.id}" class="text-muted small"></td>
                    <td class="fw-semibold" th:text="${p.nombre}"></td>
                    <td th:text="${p.marca.nombre}"></td>
                    <td th:text="${#numbers.formatDecimal(p.precio, 1, 2)} + ' €'"></td>
                    <td>
                            <span th:if="${p.descuento != null and p.descuento > 0}"
                                  class="badge bg-warning text-dark"
                                  th:text="|-${p.descuento}%|"></span>
                        <span th:unless="${p.descuento != null and p.descuento > 0}"
                              class="text-muted">—</span>
                    </td>
                    <td>
                        <span th:if="${p.agotado}" class="badge bg-danger">Agotado</span>
                        <span th:unless="${p.agotado}" class="badge bg-success">En stock</span>
                    </td>
                    <td class="text-end">
                        <a th:href="@{/admin/productos/{id}/edit(id=${p.id})}"
                           class="btn btn-sm btn-outline-primary me-1"
                           th:aria-label="|Editar producto ${p.nombre}|">
                            <i class="bi bi-pencil" aria-hidden="true"></i>
                        </a>
                        <a th:href="@{/admin/productos/{id}/delete(id=${p.id})}"
                           class="btn btn-sm btn-outline-danger"
                           th:aria-label="|Eliminar producto ${p.nombre}|">
                            <i class="bi bi-trash" aria-hidden="true"></i>
                        </a>
                    </td>
                </tr>
                </tbody>
                <tfoot class="table-secondary">
                <tr>
                    <td colspan="7" class="small text-muted"
                        th:text="|Total: ${#lists.size(productos)} producto(s)|"></td>
                </tr>
                </tfoot>
            </table>
        </div>
    </div>

    <div class="mt-3">
        <a th:href="@{/admin/productos/new}" class="btn btn-primary">
            <i class="bi bi-plus-lg me-1" aria-hidden="true"></i>Nuevo producto
        </a>
    </div>
</div>

<footer th:replace="~{admin/layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
