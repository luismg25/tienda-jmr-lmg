<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/layout :: head('Eliminar producto')}"><title>Eliminar producto</title></head>
<body class="bg-light">
<nav th:replace="~{admin/layout :: navbar}"></nav>

<div class="container mt-4 mb-5" style="max-width: 500px;">
    <h2 class="mb-4"><i class="bi bi-trash me-2"></i>Eliminar producto</h2>

    <div th:if="${error}" class="alert alert-danger" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        <span th:text="${error}"></span>
    </div>

    <div class="card border-danger shadow-sm">
        <div class="card-body p-4">
            <p class="fs-5">
                ¿Seguro que desea borrar el producto
                <strong th:text="${producto.nombre}"></strong>?
            </p>
            <p class="text-muted small">Esta acción no se puede deshacer.</p>

            <form th:action="@{/admin/productos/{id}/delete(id=${producto.id})}" method="post">
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-danger">
                        <i class="bi bi-trash me-1" aria-hidden="true"></i>Eliminar
                    </button>
                    <a th:href="@{/admin/productos}" class="btn btn-outline-secondary">
                        <i class="bi bi-x-lg me-1" aria-hidden="true"></i>Cancelar
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>

<footer th:replace="~{admin/layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
