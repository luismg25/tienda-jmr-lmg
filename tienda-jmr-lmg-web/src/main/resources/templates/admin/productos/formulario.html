<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/layout :: head(${producto.id == null ? 'Nuevo producto' : 'Editar producto'})}"><title>Producto</title></head>
<body class="bg-light">
<nav th:replace="~{admin/layout :: navbar}"></nav>

<div class="container mt-4 mb-5" style="max-width: 800px;">
    <h2 class="mb-4">
        <i class="bi bi-box-seam me-2"></i>
        <span th:text="${producto.id == null ? 'Nuevo producto' : 'Editar producto'}">Producto</span>
    </h2>

    <div th:if="${error}" class="alert alert-danger" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        <span th:text="${error}"></span>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-4">
            <form th:action="${producto.id == null ? '/admin/productos/new' : '/admin/productos/' + producto.id + '/edit'}"
                  method="post">

                <!-- Datos básicos -->
                <h5 class="text-secondary mb-3 border-bottom pb-2">Datos básicos</h5>

                <div class="row g-3 mb-3">
                    <div class="col-md-8">
                        <label for="nombre" class="form-label fw-semibold">
                            Nombre <span class="text-danger">*</span>
                        </label>
                        <input type="text" class="form-control" id="nombre" name="nombre"
                               th:value="${producto.nombre}" required maxlength="150"
                               placeholder="Nombre del producto">
                    </div>
                    <div class="col-md-4">
                        <label for="marcaId" class="form-label fw-semibold">
                            Marca <span class="text-danger">*</span>
                        </label>
                        <select class="form-select" id="marcaId" name="marcaId" required>
                            <option value="">Seleccionar...</option>
                            <option th:each="m : ${marcas}"
                                    th:value="${m.id}"
                                    th:text="${m.nombre}"
                                    th:selected="${producto.marca != null and producto.marca.id == m.id}">
                            </option>
                        </select>
                    </div>
                </div>

                <div class="row g-3 mb-3">
                    <div class="col-md-4">
                        <label for="precio" class="form-label fw-semibold">
                            Precio (€) <span class="text-danger">*</span>
                        </label>
                        <input type="number" class="form-control" id="precio" name="precio"
                               th:value="${producto.precio}" required min="0" step="0.01"
                               placeholder="0.00">
                    </div>
                    <div class="col-md-4">
                        <label for="descuento" class="form-label fw-semibold">Descuento (%)</label>
                        <input type="number" class="form-control" id="descuento" name="descuento"
                               th:value="${producto.descuento}" min="0" max="100"
                               placeholder="0">
                    </div>
                    <div class="col-md-4 d-flex align-items-end">
                        <div class="form-check mb-2">
                            <input type="hidden" name="agotado" value="false">
                            <input class="form-check-input" type="checkbox" id="agotado"
                                   name="agotado" th:checked="${producto.agotado}">
                            <label class="form-check-label fw-semibold" for="agotado">Agotado</label>
                        </div>
                    </div>
                </div>

                <!-- Detalles -->
                <h5 class="text-secondary mb-3 border-bottom pb-2 mt-4">Detalles</h5>

                <div class="row g-3 mb-3">
                    <div class="col-md-4">
                        <label for="origen" class="form-label fw-semibold">Origen</label>
                        <input type="text" class="form-control" id="origen" name="origen"
                               th:value="${producto.origen}" maxlength="100"
                               placeholder="País o región">
                    </div>
                    <div class="col-md-4">
                        <label for="peso" class="form-label fw-semibold">Peso (g)</label>
                        <input type="number" class="form-control" id="peso" name="peso"
                               th:value="${producto.peso}" min="0" step="0.01"
                               placeholder="0.00">
                    </div>
                    <div class="col-md-4">
                        <label for="dimensiones" class="form-label fw-semibold">Dimensiones (cm)</label>
                        <input type="text" class="form-control" id="dimensiones" name="dimensiones"
                               th:value="${producto.dimensiones}" maxlength="50"
                               placeholder="Ej: 10x5x3">
                    </div>
                </div>

                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <label for="fechaIngreso" class="form-label fw-semibold">Fecha de ingreso</label>
                        <input type="date" class="form-control" id="fechaIngreso" name="fechaIngreso"
                               th:value="${producto.fechaIngreso}">
                    </div>
                    <div class="col-md-6">
                        <label for="imagen" class="form-label fw-semibold">Imagen</label>
                        <input type="text" class="form-control" id="imagen" name="imagen"
                               th:value="${producto.imagen}" maxlength="500"
                               placeholder="URL o nombre de archivo">
                    </div>
                </div>

                <div class="mb-3">
                    <label for="descripcion" class="form-label fw-semibold">Descripción</label>
                    <textarea class="form-control" id="descripcion" name="descripcion"
                              rows="3" maxlength="1000"
                              placeholder="Descripción del producto"
                              th:text="${producto.descripcion}"></textarea>
                </div>

                <!-- Categorías -->
                <h5 class="text-secondary mb-3 border-bottom pb-2 mt-4">Categorías</h5>

                <div class="row g-2 mb-3">
                    <div th:if="${#lists.isEmpty(categorias)}" class="col-12">
                        <p class="text-muted small">No hay categorías disponibles.</p>
                    </div>
                    <div th:each="cat : ${categorias}" class="col-md-4 col-sm-6">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox"
                                   name="categoriaIds"
                                   th:value="${cat.id}"
                                   th:id="|cat_${cat.id}|"
                                   th:checked="${producto.categorias != null and #lists.contains(producto.categorias, cat)}">
                            <label class="form-check-label" th:for="|cat_${cat.id}|"
                                   th:text="${cat.nombre}"></label>
                        </div>
                    </div>
                </div>

                <!-- Botones -->
                <div class="d-flex gap-2 mt-4 pt-3 border-top">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-check-lg me-1" aria-hidden="true"></i>Guardar
                    </button>
                    <a th:href="@{/admin/productos}" class="btn btn-outline-secondary">
                        <i class="bi bi-x-lg me-1" aria-hidden="true"></i>Cancelar
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>

<footer th:replace="~{admin/layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
