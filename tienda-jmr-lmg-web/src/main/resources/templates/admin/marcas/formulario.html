<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/layout :: head(${marca.id == null ? 'Nueva marca' : 'Editar marca'})}"><title>Marca</title></head>
<body class="bg-light">
<nav th:replace="~{admin/layout :: navbar}"></nav>

<div class="container mt-4 mb-5" style="max-width: 600px;">
    <h2 class="mb-4">
        <i class="bi bi-tag me-2"></i>
        <span th:text="${marca.id == null ? 'Nueva marca' : 'Editar marca'}">Marca</span>
    </h2>

    <div th:if="${error}" class="alert alert-danger" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        <span th:text="${error}"></span>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-4">
            <form th:action="${marca.id == null ? '/admin/marcas/new' : '/admin/marcas/' + marca.id + '/edit'}"
                  method="post">

                <div class="mb-3">
                    <label for="nombre" class="form-label fw-semibold">
                        Nombre <span class="text-danger">*</span>
                    </label>
                    <input type="text" class="form-control" id="nombre" name="nombre"
                           th:value="${marca.nombre}" required maxlength="100"
                           placeholder="Nombre de la marca">
                </div>

                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-check-lg me-1" aria-hidden="true"></i>Guardar
                    </button>
                    <a th:href="@{/admin/marcas}" class="btn btn-outline-secondary">
                        <i class="bi bi-x-lg me-1" aria-hidden="true"></i>Cancelar
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>

<footer th:replace="~{admin/layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
