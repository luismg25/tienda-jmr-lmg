<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/layout :: head('Marcas')}"><title>Marcas</title></head>
<body class="bg-light">
<nav th:replace="~{admin/layout :: navbar}"></nav>

<div class="container mt-4 mb-5">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="mb-0"><i class="bi bi-tag me-2"></i>Marcas</h2>
        <a th:href="@{/admin/marcas/new}" class="btn btn-primary">
            <i class="bi bi-plus-lg me-1" aria-hidden="true"></i>Nueva marca
        </a>
    </div>

    <div th:if="${error}" class="alert alert-danger" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        <span th:text="${error}"></span>
    </div>

    <div class="card shadow-sm border-0">
        <div class="table-responsive">
            <table class="table table-hover table-striped align-middle mb-0">
                <thead class="table-secondary">
                <tr>
                    <th scope="col">#</th>
                    <th scope="col">Nombre</th>
                    <th scope="col">Nº productos</th>
                    <th scope="col" class="text-end">Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(marcas)}">
                    <td colspan="4" class="text-center text-muted py-4">No hay marcas registradas.</td>
                </tr>
                <tr th:each="marca : ${marcas}">
                    <td th:text="${marca.id}" class="text-muted small"></td>
                    <td class="fw-semibold" th:text="${marca.nombre}"></td>
                    <td th:text="${#lists.size(marca.productos)}"></td>
                    <td class="text-end">
                        <a th:href="@{/admin/marcas/{id}/edit(id=${marca.id})}"
                           class="btn btn-sm btn-outline-primary me-1"
                           th:aria-label="|Editar marca ${marca.nombre}|">
                            <i class="bi bi-pencil" aria-hidden="true"></i>
                        </a>
                        <a th:href="@{/admin/marcas/{id}/delete(id=${marca.id})}"
                           class="btn btn-sm btn-outline-danger"
                           th:aria-label="|Eliminar marca ${marca.nombre}|">
                            <i class="bi bi-trash" aria-hidden="true"></i>
                        </a>
                    </td>
                </tr>
                </tbody>
                <tfoot class="table-secondary">
                <tr>
                    <td colspan="4" class="small text-muted"
                        th:text="|Total: ${#lists.size(marcas)} marca(s)|"></td>
                </tr>
                </tfoot>
            </table>
        </div>
    </div>

    <div class="mt-3">
        <a th:href="@{/admin/marcas/new}" class="btn btn-primary">
            <i class="bi bi-plus-lg me-1" aria-hidden="true"></i>Nueva marca
        </a>
    </div>
</div>

<footer th:replace="~{admin/layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
