<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<!-- FRAGMENTO CABEZA -->
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' | ' + ${appName}">Tienda</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body>

<!-- FRAGMENTO NAVEGACIÓN -->
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">
            <span class="text-info">Geo</span>control
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/}">Inicio</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/categorias}">Categorías</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/sobre-nosotros.html}">Sobre Nosotros</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- FRAGMENTO PIÉ -->
<footer th:fragment="footer" class="bg-dark text-white pt-4 pb-2 mt-5">
    <div class="container text-center">
        <p class="mb-1">&copy; <span th:text="${anioActual}">2024</span> <span th:text="${appName}">Tienda</span></p>
        <p class="small text-white">Especialistas en Cuarzos y Gemas de Colección</p>
        <ul class="list-inline">
            <li class="list-inline-item">
                <a th:href="@{/terms}" class="text-info text-decoration-none small">Condiciones de Uso</a>
            </li>
        </ul>
    </div>
</footer>

</body>
</html>
